name: Deploy Sentinel Lab (RG + LAW + Sentinel + Content Hub Solutions)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange
          enable-AzPSSession: true

      - name: Create Resource Group
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create \
              --name "${{ vars.RESOURCE_GROUP }}" \
              --location "${{ vars.LOCATION }}"

      - name: Deploy Log Analytics Workspace (Bicep)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group "${{ vars.RESOURCE_GROUP }}" \
              --template-file "infra/main.bicep" \
              --parameters location="${{ vars.LOCATION }}" \
                          workspaceName="${{ vars.WORKSPACE_NAME }}" \
                          retentionInDays=${{ vars.RETENTION_DAYS }}

      - name: Onboard Sentinel
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          errorActionPreference: "Stop"
          inlineScript: |
            $ErrorActionPreference = "Stop"
            Set-AzContext -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" | Out-Null

            & "${{ github.workspace }}/scripts/01-onboard-sentinel.ps1" `
              -ResourceGroup "${{ vars.RESOURCE_GROUP }}" `
              -WorkspaceName "${{ vars.WORKSPACE_NAME }}" `
              -MaxWaitSeconds 180

      - name: Install Content Hub Solutions (by contentId)
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          errorActionPreference: "Stop"
          inlineScript: |
            $ErrorActionPreference = "Stop"
            Set-AzContext -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" | Out-Null

            & "${{ github.workspace }}/scripts/02-install-solutions.ps1" `
              -ResourceGroup "${{ vars.RESOURCE_GROUP }}" `
              -WorkspaceName "${{ vars.WORKSPACE_NAME }}" `
              -SolutionsCsv "${{ vars.SENTINEL_SOLUTIONS }}"
