name: Deploy Log Analytics + Sentinel + Solutions

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy RG + LAW + Sentinel + Solutions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange
          enable-AzPSSession: true

 # 1) Create RG with tags
      - name: Create Resource Group (with Tags)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create \
              --name "${{ vars.RESOURCE_GROUP }}" \
              --location "${{ vars.LOCATION }}" \
              --tags \
              "Entorno=PRO" \
              "Plataforma=GLB" \
              "Producto=SEN" \
              "Criticidad=Alta" \
              "Responsable del Coste=Roberto Gonzalez Marquez <roberto.gonzalez@segittur.es>" \
              "Centro Coste=7027084" \
              "Responsable del producto=PIA-SEGITTUR" \
              "Sensibilidad=Confidencial" \
              "Retención=2 años" \
              "Versión=1.0.0" \
              "Descripción=Monitorización Sentinel"

      # 2) Deploy LAW + (opcional) Sentinel Solution via Bicep with tags param
      - name: Deploy Log Analytics Workspace (Bicep)
        uses: azure/cli@v2
        with:
          inlineScript: |
            TAGS_JSON='{
              "Entorno":"PRO",
              "Plataforma":"GLB",
              "Producto":"SEN",
              "Criticidad":"Alta",
              "Responsable del Coste":"Roberto Gonzalez Marquez <roberto.gonzalez@segittur.es>",
              "Centro Coste":"7027084",
              "Responsable del producto":"PIA-SEGITTUR",
              "Sensibilidad":"Confidencial",
              "Retención":"2 años",
              "Versión":"1.0.0",
              "Descripción":"Monitorización Sentinel"
            }'

            az deployment group create \
              --resource-group "${{ vars.RESOURCE_GROUP }}" \
              --template-file "infra/main.bicep" \
              --parameters \
                location="${{ vars.LOCATION }}" \
                workspaceName="${{ vars.WORKSPACE_NAME }}" \
                retentionInDays=${{ vars.RETENTION_DAYS }} \
                tags="$TAGS_JSON"

      # 3) Onboard Sentinel (tu método actual)
      - name: Onboard Sentinel
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          errorActionPreference: "Stop"
          inlineScript: |
            $ErrorActionPreference = "Stop"
            Set-AzContext -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" | Out-Null

            & "${{ github.workspace }}/scripts/01-onboard-sentinel.ps1" `
              -ResourceGroup "${{ vars.RESOURCE_GROUP }}" `
              -WorkspaceName "${{ vars.WORKSPACE_NAME }}"

      # 4) ✅ FORCE TAGS on SecurityInsights(<workspace>) solution (porque desde Bicep no siempre se refleja)
      - name: Force Tags on Sentinel Solution (SecurityInsights)
        uses: azure/cli@v2
        with:
          inlineScript: |
            # Obtener el resourceId de la Solution
            SOLUTION_ID=$(az resource show \
              --resource-group "${{ vars.RESOURCE_GROUP }}" \
              --resource-type "Microsoft.OperationsManagement/solutions" \
              --name "SecurityInsights(${{ vars.WORKSPACE_NAME }})" \
              --query id -o tsv)

            echo "Solution resourceId: $SOLUTION_ID"

            # Aplicar tags (Merge) sobre el recurso
            az tag update \
              --resource-id "$SOLUTION_ID" \
              --operation Merge \
              --tags \
              "Entorno=PRO" \
              "Plataforma=GLB" \
              "Producto=SEN" \
              "Criticidad=Alta" \
              "Responsable del Coste=Roberto Gonzalez Marquez <roberto.gonzalez@segittur.es>" \
              "Centro Coste=7027084" \
              "Responsable del producto=PIA-SEGITTUR" \
              "Sensibilidad=Confidencial" \
              "Retención=2 años" \
              "Versión=1.0.0" \
              "Descripción=Monitorización Sentinel"

      # 5) Install Sentinel Solutions (Content Hub) - vuelve a funcionar el contenido
      - name: Install Sentinel Solutions (Content Hub)
        uses: azure/powershell@v2
        with:
          azPSVersion: "latest"
          errorActionPreference: "Stop"
          inlineScript: |
            $ErrorActionPreference = "Stop"
            Set-AzContext -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" | Out-Null

            & "${{ github.workspace }}/scripts/02-install-solutions.ps1" `
              -ResourceGroup "${{ vars.RESOURCE_GROUP }}" `
              -WorkspaceName "${{ vars.WORKSPACE_NAME }}" `
              -SolutionsCsv "${{ vars.SENTINEL_SOLUTIONS }}"
